{% extends "templates/web.html" %}
{% block title %}KRCS Internship Portal{% endblock %}

{% block head_include %}
<link rel="icon" type="image/png" href="/assets/krcs_internship/js/portal/dist/krcs-logo.png" />
<link rel="stylesheet" href="/assets/krcs_internship/js/portal/dist/portal.css" />
<style>
	header.navbar,
	.web-sidebar,
	footer.web-footer,
	nav.navbar { display: none !important; }
	body { padding-top: 0 !important; margin: 0; }
	#page-portal { padding: 0; margin: 0; }
	#app { min-height: 100vh; }
</style>
{% endblock %}

{% block page_content %}
<div id="app"></div>

<script type="application/json" id="__frappe_session_data__">
{
	"user": {{ frappe.session.user | tojson }},
	"csrf_token": {{ frappe.session.csrf_token | tojson }},
	"is_guest": {% if frappe.session.user == "Guest" %}true{% else %}false{% endif %}
}
</script>

<script>
	(function () {
		try {
			var el = document.getElementById('__frappe_session_data__');
			var data = el ? JSON.parse(el.textContent) : {};
			window.__FRAPPE_SESSION__ = data;
			window.frappe = window.frappe || {};
			window.frappe.csrf_token = data.csrf_token || '';
			window.frappe.session = { user: data.user || 'Guest' };
		} catch (e) {
			window.__FRAPPE_SESSION__ = { user: 'Guest', csrf_token: '', is_guest: true };
			window.frappe = window.frappe || {};
			window.frappe.session = { user: 'Guest' };
		}
	})();
</script>

<script src="/assets/krcs_internship/js/portal/dist/portal.js"></script>
{% endblock %}

{% block script %}{% endblock %}
