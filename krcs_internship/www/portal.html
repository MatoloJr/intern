{% extends "templates/web.html" %}
{% block title %}KRCS Internship Portal{% endblock %}

{% block head_include %}
<link rel="icon" type="image/png" href="/assets/krcs_internship/js/portal/dist/krcs-logo.png" />
<link rel="stylesheet" href="/assets/krcs_internship/js/portal/dist/portal.css" />
<style>
	header.navbar, .web-sidebar, footer.web-footer { display: none !important; }
	body { padding-top: 0 !important; }
	#page-portal { padding: 0; }
</style>
{% endblock %}

{% block page_content %}
<div id="app"></div>

<script type="application/json" id="__frappe_session__">
{
	"user": {{ frappe.session.user | tojson }},
	"csrf_token": {{ frappe.session.csrf_token | tojson }},
	"is_guest": {{ "true" if frappe.session.user == "Guest" else "false" }}
}
</script>

<script>
	(function() {
		var el = document.getElementById('__frappe_session__');
		var session = el ? JSON.parse(el.textContent) : {};
		window.__FRAPPE_SESSION__ = session;
		if (!window.frappe) { window.frappe = {}; }
		window.frappe.csrf_token = session.csrf_token;
		window.frappe.session = { user: session.user };
	})();
</script>
<script src="/assets/krcs_internship/js/portal/dist/portal.js"></script>
{% endblock %}

{% block script %}{% endblock %}
